# Test datasource: the real, running Dockerized Postgres (docker-compose.yaml), NOT an
# embedded database. The slice test pins this with @AutoConfigureTestDatabase(replace = NONE).
# Uses the superuser role because the round-trip inserts rows; the schema-only claude_readonly
# role is for MCP inspection, never for writes.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gamecleandb
    username: postgres
    password: postgres
  flyway:
    enabled: true

# game.terminal.enabled is intentionally left unset for tests: with it off, BootSequence (and the
# ConsoleSession / Terminal it drives) is absent, so @SpringBootTest contexts — which share the real
# DB — never seed implicitly, never block on a console, and never grab a system terminal. Tests that
# need the seeding path invoke WorldSeeder#seed() directly (see WorldSeederIT).
