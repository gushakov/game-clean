# Authored game calendar — the fabric of game time.
#
# This is data, not schema: it flows into the world *through the domain* (a
# GameCalendar value object, constructed and validated against the always-valid
# invariants — every radix positive, both cycles non-empty with unique names).
# It is *world content*, distinct from operational `game.time.*` configuration;
# only its location (`game.time.calendar-location`) is a property.
#
# Time is a mixed-radix positional number: one real second is one game second,
# so the whole date is a pure function of elapsed seconds, decomposed on demand
# (seconds -> hours -> days -> months -> years). The named weekday/month cycles
# turn those indices into names; the week is *continuous* (it runs unbroken
# across month and year boundaries, never reset per month).
#
# Radices and names mirror the standard calendar pinned in GameCalendarTest.

secondsPerHour: 300
hoursPerDay: 24
daysPerMonth: 30

# The weekday cycle (5 days). The epoch day (first day of year 1000) is the
# first weekday here; the continuous week advances one step per game day.
week:
  - name: Elenya
    description: guidance
  - name: Anarya
    description: vitality
  - name: Isilya
    description: reflection
  - name: Alduya
    description: growth
  - name: Menelya
    description: higher matters

# The month cycle (10 months). The year's length *is* the month count, so a year
# here is 10 * 30 = 300 days.
months:
  - name: Aelorin
    description: The Silver Wind Returns
  - name: Sylvael
    description: The First Bloom Stirs
  - name: Calivorn
    description: The Waters Awaken
  - name: Thalinde
    description: The Light Grows Long
  - name: Evaniel
    description: The Golden Tide
  - name: Miraleth
    description: The Amber Canopy
  - name: Faerundel
    description: The Drifting Mists
  - name: Veloris
    description: The Cold Moon Rises
  - name: Aelindra
    description: The Deep Frost
  - name: Sorivael
    description: The Returning Light

# Day phases — recurring moments of the day the world announces as game time crosses
# into them (dawn, dusk). Co-authored with the calendar but a distinct concern: these
# carry player-facing narrative, not calendar structure, so they live in their own
# model (DayPhase / DayPhaseSchedule) rather than on GameCalendar. The `hour` is a
# 0-based hour-of-day index and must be within `hoursPerDay`; the background time
# ticker announces a phase once per occurrence (one message picked at random).
dayPhases:
  - name: Dawn
    hour: 6
    messages:
      - The first pale light spills over the horizon; the world stirs awake.
      - Dawn breaks, and the long shadows of night retreat before the rising sun.
      - A cool, grey morning unfolds, and somewhere a lone bird greets the day.
  - name: Dusk
    hour: 18
    messages:
      - The sun sinks low, and the sky burns amber before surrendering to night.
      - Dusk settles over the land; lanterns flicker to life in the gathering dark.
      - The last light fades, and a hush falls as the world prepares for night.
