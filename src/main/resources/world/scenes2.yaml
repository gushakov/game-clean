# Alternate authored world seed — "The Tide-Wreck Coast", a fog-bound fishing hamlet
# and the sea caves beneath it. A larger graph than scenes.yaml, kept as a *separate*
# world so the curated scenes.yaml (which the tests pin) stays untouched.
#
# Load it instead of the default by passing the world to the launcher:
#   .claude/scripts/run-app.sh --world scenes2.yaml
# (which sets game.world.seed-location=classpath:world/scenes2.yaml). The entry scene is
# scn1, matching the default game.player.starting-scene-id, so no other config is needed.
#
# Same rules as scenes.yaml: data flows in through the InitializeGame use case (the
# validity gate), ids are authored short keys, exit `target`s reference scenes by id and
# may point forward, and items are rare templates spawned idempotently at seed time.

scenes:
  - id: scn1
    name: Harbor Steps
    shortDescription: Weed-slick stone steps rising from the water.
    fullDescription: >
      Green-black steps climb out of a sea that breathes against them. Fog sits on the
      water like a lid. A market lane runs north; a tarred wharf stretches east.
    exits:
      - name: north
        target: scn2
      - name: east
        target: scn3

  - id: scn2
    name: Fish Market
    shortDescription: A shuttered fish market.
    fullDescription: >
      Empty trestle tables still smell of brine and old catch. Gulls have the run of
      the place now. Lanes lead back south, west into a row of cottages, and north to
      a leaning chapel.
    exits:
      - name: south
        target: scn1
      - name: west
        target: scn4
      - name: north
        target: scn5

  - id: scn3
    name: Salt Wharf
    shortDescription: A tarred wharf over black water.
    fullDescription: >
      Mooring rings rust along a wharf whose planks flex underfoot. West are the harbor
      steps; north, a squat lighthouse holds the headland.
    exits:
      - name: west
        target: scn1
      - name: north
        target: scn6

  - id: scn4
    name: Net-Menders' Row
    shortDescription: A row of net-menders' cottages.
    fullDescription: >
      Half-mended nets hang stiff with salt between the doorways. The only way back is
      east to the market.
    exits:
      - name: east
        target: scn2

  - id: scn5
    name: The Drowned Chapel
    shortDescription: A chapel half-claimed by the tide.
    fullDescription: >
      Brackish water stands ankle-deep down the nave; the altar is furred with weed.
      A broken flagstone opens onto a stair going down. The market lies back south.
    exits:
      - name: south
        target: scn2
      - name: down
        target: scn8

  - id: scn6
    name: Lighthouse Base
    shortDescription: The foot of a squat lighthouse.
    fullDescription: >
      The lighthouse door has rotted off its frame. A spiral stair winds up to the
      lantern room; another, cruder stair drops away below. The wharf is back south.
    exits:
      - name: south
        target: scn3
      - name: up
        target: scn7
      - name: down
        target: scn8

  - id: scn7
    name: Lantern Room
    shortDescription: The lighthouse lantern room.
    fullDescription: >
      The great lens is shattered, but the view over the fog-bound coast is total. The
      only way is back down.
    exits:
      - name: down
        target: scn6

  - id: scn8
    name: Smugglers' Stair
    shortDescription: A crude stair cut into the rock.
    fullDescription: >
      Hand-cut steps sweat with seawater, worn by boots that meant not to be seen. They
      climb to the chapel and the lighthouse, and descend toward the sound of surf.
    exits:
      - name: up
        target: scn6
      - name: north
        target: scn5
      - name: down
        target: scn9

  - id: scn9
    name: Sea Cave
    shortDescription: A booming sea cave.
    fullDescription: >
      Each swell drives air into the cave with a hollow boom. The smugglers' stair rises
      behind you; a low gap leads west into a quieter grotto.
    exits:
      - name: up
        target: scn8
      - name: west
        target: scn10

  - id: scn10
    name: Tide Pool Grotto
    shortDescription: A still grotto of tide pools.
    fullDescription: >
      Beyond the cave's roar lies a vault of clear tide pools, the water lit from below
      by some pale, drifting glow. The booming cave is back east.
    exits:
      - name: east
        target: scn9

# Authored items — tuned to exercise `examine` and its disambiguation. Every spawn is
# *certain* (chance 1/1) and lands in the starting scene scn1 (a single candidate scene,
# so the uniform pick can only choose scn1), so a fresh game shows them all on the ground
# at once — no navigation needed to test.
#
# Three ambiguity surfaces, all in scn1:
#   - `examine lantern` matches itm1/itm2/itm3  -> a 3-way disambiguation menu
#   - `examine rusty`   matches itm1/itm4        -> a 2-way menu (cross-cutting the lanterns)
#   - `examine storm` / `compass` / `brass`      -> exactly one match -> straight to the reveal
#   - `examine float`   matches the two itm5 instances -> a menu of identical-looking entries
#                       (distinct ids behind the same description)
#   - `examine spoon`                            -> no match
#
# NOTE: spawning is idempotent — a restart never re-rolls. To see these on a DB that already
# seeded a previous world, start from a clean play database first.
items:
  - id: itm1
    shortDescription: A rusty ship's lantern.
    fullDescription: >
      A heavy iron ship's lantern, its panes clouded with salt and its body bled orange
      with rust. The wick is long gone.
    spawn:
      scenes: scn1
      chance: 1/1
      max: 1

  - id: itm2
    shortDescription: A cracked storm lantern.
    fullDescription: >
      A storm lantern with a star-cracked glass globe. It would gutter in the first gust,
      yet it has plainly weathered many.
    spawn:
      scenes: scn1
      chance: 1/1
      max: 1

  - id: itm3
    shortDescription: A salt-pitted hand lantern.
    fullDescription: >
      A small tin hand lantern, pitted grey-white where the salt air has gnawed at it for
      season after season.
    spawn:
      scenes: scn1
      chance: 1/1
      max: 1

  - id: itm4
    shortDescription: A rusty brass compass.
    fullDescription: >
      A brass pocket compass gone green and rust-streaked. The needle swings free,
      settling on no north you can trust.
    spawn:
      scenes: scn1
      chance: 1/1
      max: 1

  - id: itm5
    shortDescription: A pale glass net-float.
    fullDescription: >
      A hand-blown glass float, pale sea-green and clouded, the kind that once held a
      fishing net up against the swell.
    spawn:
      scenes: scn1
      chance: 1/1
      max: 2
