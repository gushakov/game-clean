spring:
  application:
    name: game-clean
  # Local development datasource — the Dockerized Postgres from docker-compose.yaml. These are
  # throwaway local credentials (the same ones committed in src/test/resources/application.yaml),
  # not secrets. Flyway autoconfigures and migrates the schema once a datasource is present.
  datasource:
    url: jdbc:postgresql://localhost:5432/gamecleandb
    username: postgres
    password: postgres

# World construction at startup (see WorldSeedProperties / WorldSeedRunner).
game:
  world:
    construct-on-startup: true
    seed-location: classpath:world/scenes.yaml
